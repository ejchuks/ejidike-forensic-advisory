<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Client Portal | Chukwuemeka Ejidike & Co.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased h-screen flex flex-col selection:bg-emerald-100 selection:text-slate-900">

    <header class="border-b border-slate-200 bg-white/95 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div>
                <a href="index.html" class="font-extrabold text-lg tracking-tight text-slate-900 block hover:text-emerald-700 transition">CHUKWUEMEKA EJIDIKE & CO.</a>
                <span class="text-[10px] font-bold uppercase tracking-widest text-emerald-700 block">Secure Gateway</span>
            </div>
            <a href="index.html" class="text-sm font-semibold text-slate-500 hover:text-slate-900 transition">&larr; Back to Main Site</a>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
            
            <div class="bg-slate-900 p-8 text-center border-b border-slate-800">
                <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-slate-800 text-emerald-400 mb-4 border border-slate-700">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <h1 class="text-2xl font-bold text-white tracking-tight">Client Portal</h1>
                <p class="text-slate-400 text-sm mt-2">Access your proprietary ledger & controls.</p>
            </div>

            <div class="p-8 space-y-6">
                <div class="bg-amber-50 border-l-4 border-amber-500 p-4 text-sm text-amber-800 rounded-r">
                    <strong>Authorized Personnel Only.</strong> Access requires active mandate and 2FA verification.
                </div>

                <form action="#" method="POST" class="space-y-5">
                    <div>
                        <label class="block text-slate-700 text-sm font-bold mb-1.5">Client ID / Corporate Email</label>
                        <input type="text" required class="w-full bg-slate-50 border border-slate-300 rounded-lg px-4 py-3 text-slate-900 focus:bg-white focus:outline-none focus:ring-2 focus:ring-emerald-600 focus:border-transparent">
                    </div>
                    
                    <div>
                        <div class="flex justify-between items-center mb-1.5">
                            <label class="block text-slate-700 text-sm font-bold">Secure Password</label>
                            <a href="engagement.html" class="text-xs text-emerald-600 font-semibold hover:underline">Request Reset?</a>
                        </div>
                        <input type="password" required class="w-full bg-slate-50 border border-slate-300 rounded-lg px-4 py-3 text-slate-900 focus:bg-white focus:outline-none focus:ring-2 focus:ring-emerald-600 focus:border-transparent">
                    </div>

                    <div class="pt-2">
                        <button type="button" onclick="alert('System Notice: Portal integration is currently being provisioned. Please contact your Managing Partner for immediate document access.')" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-extrabold py-3.5 rounded-lg uppercase tracking-wider transition text-sm flex items-center justify-center gap-2">
                            Authenticate <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </button>
                    </div>
                </form>
            </div>
            
        </div>
    </main>

    <footer class="py-6 text-center text-xs text-slate-500 font-medium">
        &copy; 2026 Chukwuemeka Ejidike & Co. | End-to-End Encrypted.
    </footer>

</body>
</html>
